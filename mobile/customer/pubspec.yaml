name: medilocal_customer
description: MediLocal customer app — order medicines from local pharmacies.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0            # REST client for the MediLocal API
  provider: ^6.1.2        # session + cart state
  shared_preferences: ^2.3.0  # persist the JWT + selected zone
  intl: ^0.19.0           # ₹ / date formatting

  # Deferred to when keys + a device are available (see README):
  # firebase_core, firebase_auth (phone OTP), firebase_messaging (push),
  # google_maps_flutter (address pin + live tracking map),
  # razorpay_flutter (online payment), socket_io_client (live GPS),
  # image_picker (prescription photo upload)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
