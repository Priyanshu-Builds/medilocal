name: medilocal_rider
description: MediLocal rider app — delivery tasks, navigation, and COD collection.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # M4 additions (kept out of M0 so the app runs with zero external setup):
  # firebase_core, firebase_auth, firebase_messaging, geolocator,
  # flutter_foreground_task (background GPS), google_maps_flutter, socket_io_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
