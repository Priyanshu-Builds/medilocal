name: medilocal_rider
description: MediLocal rider app — delivery tasks, navigation, and COD collection.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0            # REST client for the MediLocal API
  provider: ^6.1.2        # session + duty state
  shared_preferences: ^2.3.0  # persist the JWT
  intl: ^0.19.0           # ₹ / date formatting

  # Deferred to when keys + a real device are available (see README):
  # firebase_core, firebase_auth (phone OTP), firebase_messaging (task-offer push),
  # geolocator + flutter_foreground_task (background GPS streaming),
  # google_maps_flutter (pickup/drop navigation), socket_io_client (push live GPS)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
