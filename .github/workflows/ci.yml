name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  typescript:
    name: Build & typecheck (API + dashboards + shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      # The committed OpenAPI spec must match the code (it feeds the Dart client).
      - run: pnpm openapi:export
      - run: git diff --exit-code apps/api/openapi.json

  e2e:
    name: E2E order lifecycle (seeded Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: medilocal
          POSTGRES_PASSWORD: medilocal
          POSTGRES_DB: medilocal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medilocal -d medilocal"
          --health-interval 5s --health-timeout 3s --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql://medilocal:medilocal@localhost:5432/medilocal?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_test_secret
      JWT_REFRESH_SECRET: ci_test_refresh_secret
      DEV_LOGIN_ENABLED: "true"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # ts-jest compiles the app, which imports @medilocal/shared — build it first.
      - run: pnpm --filter @medilocal/shared build
      - run: pnpm --filter @medilocal/api db:deploy
      - run: pnpm --filter @medilocal/api db:seed
      - run: pnpm --filter @medilocal/api test:e2e

  dart-client:
    name: Generate Dart API client from OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: dart-lang/setup-dart@v1
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen:dart-client
      - run: dart pub get
        working-directory: mobile/api_client

  flutter:
    name: Analyze Flutter apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [customer, rider]
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: mobile/${{ matrix.app }}
      - run: flutter analyze
        working-directory: mobile/${{ matrix.app }}
