name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  typescript:
    name: Build & typecheck (API + dashboards + shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck

  flutter:
    name: Analyze Flutter apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [customer, rider]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: mobile/${{ matrix.app }}
      - run: flutter analyze
        working-directory: mobile/${{ matrix.app }}
