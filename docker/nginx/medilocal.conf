# Nginx edge for the MediLocal API. Terminates TLS and reverse-proxies to the
# api container. HTTP (:80) redirects to HTTPS once certs are in place.

upstream medilocal_api {
    server api:3000;
}

# --- HTTP: redirect to HTTPS (and serve ACME challenges for cert issuance) ---
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Provide these via ./docker/nginx/certs (e.g. Let's Encrypt fullchain + privkey).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Prescription images / uploads pass through here.
    client_max_body_size 15m;

    location / {
        proxy_pass http://medilocal_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; # trust-proxy reads this for rate-limiting
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
